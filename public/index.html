<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3×3 Cubby Bookshelf — 3D Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0ede6;
      --card: #ffffff;
      --text: #2c2c2a;
      --text2: #5f5e5a;
      --text3: #88878080;
      --border: rgba(0,0,0,0.1);
      --accent: #C8A86E;
      --btn-bg: transparent;
      --btn-border: rgba(0,0,0,0.2);
      --btn-hover: rgba(0,0,0,0.05);
      --scene-bg: 0xf0ede6;
      --wall-color: 0xE8E4DC;
      --floor-color: 0xDDD8CE;
      --inner-color: 0xDDD4C0;
      --handle-color: 0xB8A868;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a18;
        --card: #242422;
        --text: #e0ddd4;
        --text2: #a09e96;
        --text3: #6a6862;
        --border: rgba(255,255,255,0.08);
        --accent: #D4B87A;
        --btn-bg: transparent;
        --btn-border: rgba(255,255,255,0.15);
        --btn-hover: rgba(255,255,255,0.06);
        --scene-bg: 0x1c1c1a;
        --wall-color: 0x26252a;
        --floor-color: 0x222220;
        --inner-color: 0x2e2a24;
        --handle-color: 0x3a3630;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 500;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      font-size: 0.875rem;
      color: var(--text2);
      margin-bottom: 1.25rem;
    }

    .viewer-card {
      width: 100%;
      max-width: 800px;
      background: var(--card);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    #canvas-container {
      width: 100%;
      height: 520px;
      cursor: grab;
      position: relative;
    }
    #canvas-container:active { cursor: grabbing; }

    .controls {
      display: flex;
      gap: 10px;
      padding: 12px 16px;
      align-items: center;
      flex-wrap: wrap;
      border-top: 0.5px solid var(--border);
    }

    .controls button {
      background: var(--btn-bg);
      color: var(--text);
      border: 0.5px solid var(--btn-border);
      border-radius: 8px;
      padding: 7px 16px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .controls button:hover { background: var(--btn-hover); }
    .controls button:active { transform: scale(0.98); }

    .hint {
      font-size: 12px;
      color: var(--text3);
      margin-left: auto;
    }

    .specs {
      width: 100%;
      max-width: 800px;
      margin-top: 1.5rem;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
    }

    .spec-card {
      background: var(--card);
      border: 0.5px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
    }
    .spec-card .label {
      font-size: 12px;
      color: var(--text2);
      margin-bottom: 4px;
    }
    .spec-card .value {
      font-size: 18px;
      font-weight: 500;
    }

    footer {
      margin-top: 2rem;
      font-size: 12px;
      color: var(--text3);
    }
  </style>
</head>
<body>

  <h1>3×3 Cubby Bookshelf</h1>
  <p class="subtitle">Interactive 3D model — oak frame, MDF back, two drawers</p>

  <div class="viewer-card">
    <div id="canvas-container"></div>
    <div class="controls">
      <button id="btn-reset">Reset view</button>
      <button id="btn-explode">Explode / Assemble</button>
      <button id="btn-drawers">Open / Close drawers</button>
      <span class="hint">Drag to orbit · Scroll to zoom</span>
    </div>
  </div>

  <div class="specs">
    <div class="spec-card">
      <div class="label">Overall width</div>
      <div class="value">36 cm</div>
    </div>
    <div class="spec-card">
      <div class="label">Overall height</div>
      <div class="value">44 cm</div>
    </div>
    <div class="spec-card">
      <div class="label">Depth</div>
      <div class="value">24 cm</div>
    </div>
    <div class="spec-card">
      <div class="label">Cubbies</div>
      <div class="value">3 × 3</div>
    </div>
    <div class="spec-card">
      <div class="label">Drawers</div>
      <div class="value">2</div>
    </div>
    <div class="spec-card">
      <div class="label">Material</div>
      <div class="value">Oak + MDF</div>
    </div>
  </div>

  <footer>Built with Three.js r128</footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    (function () {
      const ctn = document.getElementById('canvas-container');
      const W = ctn.clientWidth, H = 520;
      const isDark = matchMedia('(prefers-color-scheme:dark)').matches;

      // --- Scene setup ---
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(isDark ? 0x1c1c1a : 0xf0ede6);

      const camera = new THREE.PerspectiveCamera(32, W / H, 0.1, 600);
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(W, H);
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.05;
      ctn.appendChild(renderer.domElement);

      // --- Lights ---
      scene.add(new THREE.AmbientLight(0xfff5e6, 0.45));

      const sun = new THREE.DirectionalLight(0xfff8ee, 0.85);
      sun.position.set(25, 35, 30);
      sun.castShadow = true;
      sun.shadow.mapSize.set(1024, 1024);
      sun.shadow.camera.near = 1;
      sun.shadow.camera.far = 120;
      sun.shadow.camera.left = -40;
      sun.shadow.camera.right = 40;
      sun.shadow.camera.top = 40;
      sun.shadow.camera.bottom = -40;
      scene.add(sun);

      const fill = new THREE.DirectionalLight(0xc8ddf8, 0.25);
      fill.position.set(-18, 12, -15);
      scene.add(fill);

      const rim = new THREE.DirectionalLight(0xffe8d0, 0.2);
      rim.position.set(-5, 20, 30);
      scene.add(rim);

      // --- Materials ---
      function M(c, r) {
        return new THREE.MeshStandardMaterial({ color: c, roughness: r || 0.68, metalness: 0 });
      }
      const oak   = M(0xC8A86E, 0.6);
      const oakL  = M(0xD4B87A, 0.55);
      const oakD  = M(0xB09060, 0.65);
      const mdf   = M(0x9E8468, 0.85);
      const inner = M(isDark ? 0x2e2a24 : 0xDDD4C0, 0.9);
      const drawerMat = M(0xCCB278, 0.58);
      const handleMat = M(isDark ? 0x3a3630 : 0xB8A868, 0.7);
      const drawerBoxMat = M(0xB8A060, 0.8);

      // --- Dimensions ---
      const TW = 36, TH = 44, TD = 24;
      const PT = 1.4;
      const cols = 3, rows = 3;
      const cellW = (TW - PT * (cols + 1)) / cols;
      const cellH = (TH - 6 - PT * (rows + 1)) / rows;
      const drawerH = 5;

      const G = new THREE.Group();
      scene.add(G);
      const parts = {};
      const home = {};

      function box(w, h, d, m, name, px, py, pz) {
        const g = new THREE.BoxGeometry(w, h, d);
        const mesh = new THREE.Mesh(g, m);
        mesh.position.set(px, py, pz);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        if (name) { parts[name] = mesh; home[name] = [px, py, pz]; }
        G.add(mesh);
        return mesh;
      }

      // --- Build shelf structure ---
      box(TW, PT, TD, oakL, 'top', 0, TH / 2 - PT / 2, 0);
      box(TW, PT, TD, oak, 'bot', 0, -TH / 2 + drawerH + PT / 2, 0);
      box(TW, drawerH, TD, oakD, 'drawerBase', 0, -TH / 2 + drawerH / 2, 0);
      box(TW, PT, TD, oak, 'floor', 0, -TH / 2 + PT / 2, 0);

      box(PT, TH, TD, oak, 'sideL', -TW / 2 + PT / 2, 0, 0);
      box(PT, TH, TD, oak, 'sideR', TW / 2 - PT / 2, 0, 0);

      const shelfStartY = -TH / 2 + drawerH + PT;
      for (let i = 1; i < rows; i++) {
        const sy = shelfStartY + i * (cellH + PT) + PT / 2;
        box(TW - 2 * PT, PT, TD, oak, 'hShelf' + i, 0, sy, 0);
      }
      for (let j = 1; j < cols; j++) {
        const sx = -TW / 2 + PT + j * (cellW + PT) + PT / 2;
        const vH = TH - drawerH - 2 * PT;
        const vy = shelfStartY + vH / 2 + PT / 2;
        box(PT, vH, TD, oakD, 'vDiv' + j, sx, vy, 0);
      }

      // Back panel
      box(TW - 2 * PT, TH - 2 * PT, 0.6, mdf, 'backPanel', 0, 0, -TD / 2 + 0.3 + PT / 2);

      // Inner cubby depth fills
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const cx = -TW / 2 + PT + c * (cellW + PT) + cellW / 2 + PT / 2;
          const cy = shelfStartY + PT + r * (cellH + PT) + cellH / 2 + PT / 2;
          box(cellW - 0.4, cellH - 0.4, 0.3, inner, null, cx, cy, -TD / 2 + PT + 0.5);
        }
      }

      // --- Drawers ---
      const dw = (TW - 3 * PT) / 2;
      const dy = -TH / 2 + drawerH / 2 + PT;
      const dzClose = TD / 2 - 0.5;

      function makeDrawer(name, posX) {
        const grp = new THREE.Group();

        const front = new THREE.Mesh(new THREE.BoxGeometry(dw, drawerH - PT, 1.2), drawerMat);
        front.position.set(0, 0, dzClose);
        front.castShadow = true;
        grp.add(front);

        const handle = new THREE.Mesh(new THREE.BoxGeometry(4, 1.2, 0.8), handleMat);
        handle.position.set(0, 1, dzClose + 0.6);
        handle.castShadow = true;
        grp.add(handle);

        const body = new THREE.Mesh(new THREE.BoxGeometry(dw - 1, drawerH - PT - 1, TD - 4), drawerBoxMat);
        body.position.set(0, -0.5, 0);
        body.castShadow = true;
        grp.add(body);

        grp.position.set(posX, dy, 0);
        parts[name] = grp;
        home[name] = [posX, dy, 0];
        G.add(grp);
        return grp;
      }

      makeDrawer('drawerL', -TW / 2 + PT + dw / 2 + PT / 2);
      makeDrawer('drawerR', TW / 2 - PT - dw / 2 - PT / 2);

      // --- Environment: wall + floor ---
      const wallMesh = new THREE.Mesh(
        new THREE.PlaneGeometry(100, 70),
        new THREE.MeshStandardMaterial({ color: isDark ? 0x26252a : 0xE8E4DC, roughness: 0.95 })
      );
      wallMesh.position.set(0, 8, -TD / 2 - 1);
      wallMesh.receiveShadow = true;
      scene.add(wallMesh);

      const floorMesh = new THREE.Mesh(
        new THREE.PlaneGeometry(100, 80),
        new THREE.MeshStandardMaterial({ color: isDark ? 0x222220 : 0xDDD8CE, roughness: 0.95 })
      );
      floorMesh.rotation.x = -Math.PI / 2;
      floorMesh.position.y = -TH / 2 - 0.5;
      floorMesh.receiveShadow = true;
      scene.add(floorMesh);

      // --- Animation helper ---
      function anim(pos, tgt) {
        const s = { x: pos.x, y: pos.y, z: pos.z };
        const d = 450, t0 = performance.now();
        (function tick(now) {
          const p = Math.min((now - t0) / d, 1);
          const e = 1 - Math.pow(1 - p, 3);
          pos.x = s.x + (tgt[0] - s.x) * e;
          pos.y = s.y + (tgt[1] - s.y) * e;
          pos.z = s.z + (tgt[2] - s.z) * e;
          if (p < 1) requestAnimationFrame(tick);
        })(t0);
      }

      // --- Explode ---
      let exploded = false;
      const expOff = {
        top: [0, 7, 0], bot: [0, 0, 0], drawerBase: [0, -5, 0], floor: [0, -8, 0],
        sideL: [-7, 0, 0], sideR: [7, 0, 0],
        hShelf1: [0, 2, 3], hShelf2: [0, 4, 3],
        vDiv1: [-3, 0, 3], vDiv2: [3, 0, 3],
        backPanel: [0, 0, -8],
        drawerL: [-4, -6, 10], drawerR: [4, -6, 10]
      };

      function toggleExplode() {
        exploded = !exploded;
        Object.keys(parts).forEach(function (k) {
          const h = home[k]; if (!h) return;
          const e = expOff[k] || [0, 0, 0];
          const tgt = exploded ? [h[0] + e[0], h[1] + e[1], h[2] + e[2]] : h;
          anim(parts[k].position, tgt);
        });
      }

      // --- Drawers ---
      let drawersOpen = false;
      function toggleDrawers() {
        if (exploded) return;
        drawersOpen = !drawersOpen;
        var dz = drawersOpen ? 10 : 0;
        var hL = home['drawerL'], hR = home['drawerR'];
        anim(parts['drawerL'].position, [hL[0], hL[1], hL[2] + dz]);
        anim(parts['drawerR'].position, [hR[0], hR[1], hR[2] + dz]);
      }

      // --- Orbit controls (manual) ---
      let drag = false, px = 0, py = 0;
      let rotY = -0.35, rotX = 0.2, dist = 80;
      const el = renderer.domElement;

      el.addEventListener('pointerdown', function (e) {
        drag = true; px = e.clientX; py = e.clientY;
        el.style.cursor = 'grabbing';
      });
      window.addEventListener('pointerup', function () {
        drag = false; el.style.cursor = 'grab';
      });
      window.addEventListener('pointermove', function (e) {
        if (!drag) return;
        rotY -= (e.clientX - px) * 0.007;
        rotX += (e.clientY - py) * 0.007;
        rotX = Math.max(-1.2, Math.min(1.2, rotX));
        px = e.clientX; py = e.clientY;
      });
      el.addEventListener('wheel', function (e) {
        e.preventDefault();
        dist = Math.max(30, Math.min(160, dist + e.deltaY * 0.06));
      }, { passive: false });

      function resetCam() { rotY = -0.35; rotX = 0.2; dist = 80; }

      // --- Buttons ---
      document.getElementById('btn-reset').onclick = resetCam;
      document.getElementById('btn-explode').onclick = toggleExplode;
      document.getElementById('btn-drawers').onclick = toggleDrawers;

      // --- Render loop ---
      (function loop() {
        requestAnimationFrame(loop);
        camera.position.x = Math.sin(rotY) * Math.cos(rotX) * dist;
        camera.position.y = Math.sin(rotX) * dist + 4;
        camera.position.z = Math.cos(rotY) * Math.cos(rotX) * dist;
        camera.lookAt(0, 2, 0);
        renderer.render(scene, camera);
      })();

      // --- Resize ---
      window.addEventListener('resize', function () {
        var nw = ctn.clientWidth;
        camera.aspect = nw / H;
        camera.updateProjectionMatrix();
        renderer.setSize(nw, H);
      });
    })();
  </script>
</body>
</html>
