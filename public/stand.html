<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Low Shelf Table</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗄️</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
      background: #000;
    }

    #canvas-container {
      width: 100vw;
      height: 100vh;
      cursor: grab;
    }
    #canvas-container:active { cursor: grabbing; }

    .controls {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 10;
    }

    .controls button {
      background: rgba(30, 30, 30, 0.7);
      color: #ccc;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      padding: 8px 18px;
      font-size: 13px;
      cursor: pointer;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: background 0.15s, color 0.15s;
    }
    .controls button:hover {
      background: rgba(50, 50, 50, 0.85);
      color: #fff;
    }
    .controls button:active { transform: scale(0.97); }

  </style>
</head>
<body>

  <div id="canvas-container"></div>


  <div class="controls">
    <button id="btn-reset">Reset view</button>
    <button id="btn-explode">Explode / Assemble</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    (function () {
      var ctn = document.getElementById('canvas-container');
      var W = ctn.clientWidth, H = ctn.clientHeight;

      var scene = new THREE.Scene();
      scene.background = new THREE.Color(0xf0ede6);

      var camera = new THREE.PerspectiveCamera(32, W / H, 0.1, 600);
      var renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(W, H);
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.05;
      ctn.appendChild(renderer.domElement);

      /* ---- Lights ---- */
      scene.add(new THREE.AmbientLight(0xfff5e6, 0.5));
      var sun = new THREE.DirectionalLight(0xfff8ee, 0.85);
      sun.position.set(25, 40, 30);
      sun.castShadow = true;
      sun.shadow.mapSize.set(1024, 1024);
      sun.shadow.camera.near = 1; sun.shadow.camera.far = 120;
      sun.shadow.camera.left = -40; sun.shadow.camera.right = 40;
      sun.shadow.camera.top = 40; sun.shadow.camera.bottom = -40;
      scene.add(sun);
      var fill = new THREE.DirectionalLight(0xc8ddf8, 0.25);
      fill.position.set(-18, 12, -15);
      scene.add(fill);
      var rim = new THREE.DirectionalLight(0xffe8d0, 0.2);
      rim.position.set(-5, 25, 30);
      scene.add(rim);

      /* ---- Material ---- */
      var grey = new THREE.MeshStandardMaterial({ color: 0x808080, roughness: 0.5, metalness: 0 });
      var mTabletop = grey, mLegs = grey, mSlat1 = grey, mSlat2 = grey;
      var mRail1 = grey, mRail2 = grey, mApron = grey;

      /* ---- Dimensions (cm) ---- */
      var TW = 48;
      var TH = 20;
      var TD = 24;
      var topT = 1.6;
      var legS = 3.0;
      var legH = TH - topT;
      var shelfT = 1.2;

      var lx = TW / 2 - legS / 2 - 0.5;
      var lz = TD / 2 - legS / 2 - 0.5;

      var gap = legH / 3;
      var shelf1Y = gap;
      var shelf2Y = gap * 2;

      var shelfW = lx * 2 - legS;
      var shelfD = lz * 2 - legS;

      var G = new THREE.Group();
      scene.add(G);
      var parts = {};
      var home = {};

      function box(w, h, d, mat, name, px, py, pz) {
        var g = new THREE.BoxGeometry(w, h, d);
        var mesh = new THREE.Mesh(g, mat);
        mesh.position.set(px, py, pz);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        if (name) { parts[name] = mesh; home[name] = [px, py, pz]; }
        G.add(mesh);
        return mesh;
      }

      /* ---- Tabletop ---- */
      box(TW, topT, TD, mTabletop, 'tabletop', 0, legH + topT / 2, 0);

      /* ---- 4 Legs ---- */
      box(legS, legH, legS, mLegs, 'legFL', -lx, legH / 2, lz);
      box(legS, legH, legS, mLegs, 'legFR', lx, legH / 2, lz);
      box(legS, legH, legS, mLegs, 'legBL', -lx, legH / 2, -lz);
      box(legS, legH, legS, mLegs, 'legBR', lx, legH / 2, -lz);

      /* ---- Shelf slats — planks running left-to-right, sitting on side rails ---- */
      var slatCount = 4;
      var slatGap = 0.6;
      var totalGaps = (slatCount - 1) * slatGap;
      var slatD = (shelfD - totalGaps) / slatCount;

      for (var s = 0; s < slatCount; s++) {
        var sz = -shelfD / 2 + slatD / 2 + s * (slatD + slatGap);
        box(shelfW, shelfT, slatD, mSlat1, 'slat1_' + s, 0, shelf1Y, sz);
        box(shelfW, shelfT, slatD, mSlat2, 'slat2_' + s, 0, shelf2Y, sz);
      }

      /* ---- Side rails (left & right, connecting front to back leg at each shelf level) ---- */
      var railW = 1.4;
      var railH = 1.6;
      var railLen = lz * 2;

      box(railW, railH, railLen, mRail1, 'railL1', -lx, shelf1Y, 0);
      box(railW, railH, railLen, mRail1, 'railR1', lx, shelf1Y, 0);
      box(railW, railH, railLen, mRail2, 'railL2', -lx, shelf2Y, 0);
      box(railW, railH, railLen, mRail2, 'railR2', lx, shelf2Y, 0);

      /* ---- Front & back apron rails just under tabletop ---- */
      var apronW = lx * 2;
      var apronH = 2.0;
      var apronD = 1.4;
      var apronY = legH - apronH / 2 - 0.2;

      box(apronW, apronH, apronD, mApron, 'apronF', 0, apronY, lz);
      box(apronW, apronH, apronD, mApron, 'apronB', 0, apronY, -lz);

      /* ---- Floor ---- */
      var floorMesh = new THREE.Mesh(
        new THREE.PlaneGeometry(120, 100),
        new THREE.MeshStandardMaterial({ color: 0xDDD8CE, roughness: 0.95 })
      );
      floorMesh.rotation.x = -Math.PI / 2;
      floorMesh.position.y = -0.2;
      floorMesh.receiveShadow = true;
      scene.add(floorMesh);

      /* ---- Explode ---- */
      var exploded = false;
      var expOff = {
        tabletop: [0, 10, 0],
        legFL: [-7, 0, 7], legFR: [7, 0, 7],
        legBL: [-7, 0, -7], legBR: [7, 0, -7],
        railL1: [-9, -4, 0], railR1: [9, -4, 0],
        railL2: [-9, 4, 0], railR2: [9, 4, 0],
        apronF: [0, 7, 7], apronB: [0, 7, -7]
      };
      for (var s = 0; s < slatCount; s++) {
        expOff['slat1_' + s] = [0, -7, 3 + s * 4];
        expOff['slat2_' + s] = [s * 5, 7, 0];
      }

      function anim(pos, tgt) {
        var st = { x: pos.x, y: pos.y, z: pos.z };
        var d = 500, t0 = performance.now();
        (function tick(now) {
          var p = Math.min((now - t0) / d, 1);
          var e = 1 - Math.pow(1 - p, 3);
          pos.x = st.x + (tgt[0] - st.x) * e;
          pos.y = st.y + (tgt[1] - st.y) * e;
          pos.z = st.z + (tgt[2] - st.z) * e;
          if (p < 1) requestAnimationFrame(tick);
        })(t0);
      }

      function toggleExplode() {
        exploded = !exploded;
        floorMesh.visible = !exploded;
        Object.keys(parts).forEach(function (k) {
          var h = home[k]; if (!h) return;
          var e = expOff[k] || [0, 0, 0];
          var tgt = exploded ? [h[0] + e[0], h[1] + e[1], h[2] + e[2]] : h;
          anim(parts[k].position, tgt);
        });
      }

      /* ---- Orbit ---- */
      var drag = false, px = 0, py = 0;
      var rotY = -0.4, rotX = 0.45, dist = 110;
      var el = renderer.domElement;

      el.addEventListener('pointerdown', function (e) {
        drag = true; px = e.clientX; py = e.clientY;
        el.style.cursor = 'grabbing';
      });
      window.addEventListener('pointerup', function () {
        drag = false; el.style.cursor = 'grab';
      });
      window.addEventListener('pointermove', function (e) {
        if (!drag) return;
        rotY -= (e.clientX - px) * 0.007;
        rotX += (e.clientY - py) * 0.007;
        rotX = Math.max(-1.2, Math.min(1.2, rotX));
        px = e.clientX; py = e.clientY;
      });
      el.addEventListener('wheel', function (e) {
        e.preventDefault();
        dist = Math.max(20, Math.min(200, dist + e.deltaY * 0.06));
      }, { passive: false });

      function resetCam() { rotY = -0.4; rotX = 0.45; dist = 110; }

      /* ---- Buttons ---- */
      document.getElementById('btn-reset').onclick = resetCam;
      document.getElementById('btn-explode').onclick = toggleExplode;

      /* ---- Render ---- */
      var lookY = TH / 2;
      (function loop() {
        requestAnimationFrame(loop);
        camera.position.x = Math.sin(rotY) * Math.cos(rotX) * dist;
        camera.position.y = Math.sin(rotX) * dist + 6;
        camera.position.z = Math.cos(rotY) * Math.cos(rotX) * dist;
        camera.lookAt(0, lookY, 0);
        renderer.render(scene, camera);
      })();

      /* ---- Resize ---- */
      window.addEventListener('resize', function () {
        W = ctn.clientWidth; H = ctn.clientHeight;
        camera.aspect = W / H;
        camera.updateProjectionMatrix();
        renderer.setSize(W, H);
      });
    })();
  </script>
</body>
</html>
