<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Cubby Bookshelf</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
      background: #000;
    }

    #canvas-container {
      width: 100vw;
      height: 100vh;
      cursor: grab;
    }
    #canvas-container:active { cursor: grabbing; }

    .controls {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 10;
    }

    .controls button {
      background: rgba(30, 30, 30, 0.7);
      color: #ccc;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      padding: 8px 18px;
      font-size: 13px;
      cursor: pointer;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: background 0.15s, color 0.15s;
    }
    .controls button:hover {
      background: rgba(50, 50, 50, 0.85);
      color: #fff;
    }
    .controls button:active { transform: scale(0.97); }

  </style>
</head>
<body>

  <div id="canvas-container"></div>


  <div class="controls">
    <button id="btn-reset">Reset view</button>
    <button id="btn-explode">Explode / Assemble</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    (function () {
      const ctn = document.getElementById('canvas-container');
      let W = ctn.clientWidth, H = ctn.clientHeight;
      // --- Scene setup ---
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0xf0ede6);

      const camera = new THREE.PerspectiveCamera(32, W / H, 0.1, 600);
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(W, H);
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.05;
      ctn.appendChild(renderer.domElement);

      // --- Lights ---
      scene.add(new THREE.AmbientLight(0xfff5e6, 0.45));

      const sun = new THREE.DirectionalLight(0xfff8ee, 0.85);
      sun.position.set(25, 35, 30);
      sun.castShadow = true;
      sun.shadow.mapSize.set(1024, 1024);
      sun.shadow.camera.near = 1;
      sun.shadow.camera.far = 120;
      sun.shadow.camera.left = -40;
      sun.shadow.camera.right = 40;
      sun.shadow.camera.top = 40;
      sun.shadow.camera.bottom = -40;
      scene.add(sun);

      const fill = new THREE.DirectionalLight(0xc8ddf8, 0.25);
      fill.position.set(-18, 12, -15);
      scene.add(fill);

      const rim = new THREE.DirectionalLight(0xffe8d0, 0.2);
      rim.position.set(-5, 20, 30);
      scene.add(rim);

      // --- Materials (Blender default grey) ---
      const grey = new THREE.MeshStandardMaterial({ color: 0x808080, roughness: 0.5, metalness: 0 });
      const oak = grey;
      const oakL = grey;
      const oakD = grey;
      const mdf = grey;

      // --- Dimensions ---
      const TW = 36, TH = 44, TD = 24;
      const PT = 1.4;
      const cols = 3, rows = 3;
      const cellW = (TW - PT * (cols + 1)) / cols;
      const cellH = (TH - 6 - PT * (rows + 1)) / rows;
      const drawerH = 5;

      var floorMesh = new THREE.Mesh(
        new THREE.PlaneGeometry(120, 100),
        new THREE.MeshStandardMaterial({ color: 0xDDD8CE, roughness: 0.95 })
      );
      floorMesh.rotation.x = -Math.PI / 2;
      floorMesh.position.y = -TH / 2 - 0.2;
      floorMesh.receiveShadow = true;
      scene.add(floorMesh);

      const G = new THREE.Group();
      scene.add(G);
      const parts = {};
      const home = {};

      function box(w, h, d, m, name, px, py, pz) {
        const g = new THREE.BoxGeometry(w, h, d);
        const mesh = new THREE.Mesh(g, m);
        mesh.position.set(px, py, pz);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        if (name) { parts[name] = mesh; home[name] = [px, py, pz]; }
        G.add(mesh);
        return mesh;
      }

      // --- Build shelf structure ---
      box(TW, PT, TD, oakL, 'top', 0, TH / 2 - PT / 2, 0);
      box(TW, PT, TD, oak, 'bot', 0, -TH / 2 + drawerH + PT / 2, 0);
      box(TW, drawerH, TD, oakD, 'drawerBase', 0, -TH / 2 + drawerH / 2, 0);

      box(PT, TH, TD, oak, 'sideL', -TW / 2 + PT / 2, 0, 0);
      box(PT, TH, TD, oak, 'sideR', TW / 2 - PT / 2, 0, 0);

      const shelfStartY = -TH / 2 + drawerH + PT;
      for (let i = 1; i < rows; i++) {
        const sy = shelfStartY + i * (cellH + PT) + PT / 2;
        box(TW - 2 * PT, PT, TD, oak, 'hShelf' + i, 0, sy, 0);
      }
      for (let j = 1; j < cols; j++) {
        const sx = -TW / 2 + PT + j * (cellW + PT) + PT / 2;
        const vH = TH - drawerH - 2 * PT;
        const vy = shelfStartY + vH / 2 + PT / 2;
        box(PT, vH, TD, oakD, 'vDiv' + j, sx, vy, 0);
      }

      // Back panel
      box(TW - 2 * PT, TH - 2 * PT, 0.6, mdf, 'backPanel', 0, 0, -TD / 2 + 0.3 + PT / 2);

      // --- Drawer fronts ---
      const dw = (TW - 3 * PT) / 2;
      const dy = -TH / 2 + drawerH / 2;
      const dzFront = TD / 2 - 0.6;

      box(dw, drawerH - PT, 1.2, oak, 'drawerL', -TW / 2 + PT + dw / 2 + PT / 2, dy, dzFront);
      box(dw, drawerH - PT, 1.2, oak, 'drawerR', TW / 2 - PT - dw / 2 - PT / 2, dy, dzFront);

      // Handles
      box(4, 1.2, 0.8, oakD, null, -TW / 2 + PT + dw / 2 + PT / 2, dy + 1, dzFront + 0.8);
      box(4, 1.2, 0.8, oakD, null, TW / 2 - PT - dw / 2 - PT / 2, dy + 1, dzFront + 0.8);

      // --- Animation helper ---
      function anim(pos, tgt) {
        const s = { x: pos.x, y: pos.y, z: pos.z };
        const d = 450, t0 = performance.now();
        (function tick(now) {
          const p = Math.min((now - t0) / d, 1);
          const e = 1 - Math.pow(1 - p, 3);
          pos.x = s.x + (tgt[0] - s.x) * e;
          pos.y = s.y + (tgt[1] - s.y) * e;
          pos.z = s.z + (tgt[2] - s.z) * e;
          if (p < 1) requestAnimationFrame(tick);
        })(t0);
      }

      // --- Explode ---
      let exploded = false;
      const expOff = {
        top: [0, 7, 0], bot: [0, -3, 0], drawerBase: [0, -5, 0],
        sideL: [-7, 0, 0], sideR: [7, 0, 0],
        hShelf1: [0, 2, 3], hShelf2: [0, 4, 3],
        vDiv1: [-3, 0, 3], vDiv2: [3, 0, 3],
        backPanel: [0, 0, -8],
        drawerL: [-4, -6, 12], drawerR: [4, -6, 12]
      };

      function toggleExplode() {
        exploded = !exploded;
        floorMesh.visible = !exploded;
        Object.keys(parts).forEach(function (k) {
          const h = home[k]; if (!h) return;
          const e = expOff[k] || [0, 0, 0];
          const tgt = exploded ? [h[0] + e[0], h[1] + e[1], h[2] + e[2]] : h;
          anim(parts[k].position, tgt);
        });
      }

      // --- Orbit controls (manual) ---
      let drag = false, px = 0, py = 0;
      let rotY = -0.2, rotX = 0.12, dist = 115;
      const el = renderer.domElement;

      el.addEventListener('pointerdown', function (e) {
        drag = true; px = e.clientX; py = e.clientY;
        el.style.cursor = 'grabbing';
      });
      window.addEventListener('pointerup', function () {
        drag = false; el.style.cursor = 'grab';
      });
      window.addEventListener('pointermove', function (e) {
        if (!drag) return;
        rotY -= (e.clientX - px) * 0.007;
        rotX += (e.clientY - py) * 0.007;
        rotX = Math.max(-1.2, Math.min(1.2, rotX));
        px = e.clientX; py = e.clientY;
      });
      el.addEventListener('wheel', function (e) {
        e.preventDefault();
        dist = Math.max(30, Math.min(160, dist + e.deltaY * 0.06));
      }, { passive: false });

      function resetCam() { rotY = -0.2; rotX = 0.12; dist = 115; }

      // --- Buttons ---
      document.getElementById('btn-reset').onclick = resetCam;
      document.getElementById('btn-explode').onclick = toggleExplode;

      // --- Render loop ---
      (function loop() {
        requestAnimationFrame(loop);
        camera.position.x = Math.sin(rotY) * Math.cos(rotX) * dist;
        camera.position.y = Math.sin(rotX) * dist + 4;
        camera.position.z = Math.cos(rotY) * Math.cos(rotX) * dist;
        camera.lookAt(0, 2, 0);
        renderer.render(scene, camera);
      })();

      // --- Resize ---
      window.addEventListener('resize', function () {
        W = ctn.clientWidth;
        H = ctn.clientHeight;
        camera.aspect = W / H;
        camera.updateProjectionMatrix();
        renderer.setSize(W, H);
      });
    })();
  </script>
</body>
</html>
